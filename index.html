<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Directorio Industria Médica – BC</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#eef2f7;height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
#hdr{
  padding:9px 18px;background:#fff;border-bottom:1px solid #dde3ec;
  display:flex;align-items:center;gap:11px;flex-wrap:wrap;
  box-shadow:0 1px 5px rgba(0,0,0,.07);z-index:1000;position:relative
}
#hdr h1{font-size:14px;font-weight:700;color:#1d3a5f;white-space:nowrap}
.cnt{background:#e8f0fb;color:#2563a8;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #c5d8f5}
#ctrl{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-left:auto}
#ctrl select,#ctrl input{background:#f7f9fc;border:1px solid #c8d4e3;color:#2a3a50;padding:4px 9px;border-radius:6px;font-size:12px;outline:none}
#ctrl select:focus,#ctrl input:focus{border-color:#3b82f6}
.chk{font-size:12px;color:#4a5f78;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}

/* ── Map ── */
#map{flex:1;position:relative;overflow:hidden}
#svgLayer,#lblLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#svgLayer{z-index:390;overflow:visible}
#lblLayer{z-index:410}

.lbl{
  position:absolute;
  background:rgba(255,255,255,.96);
  border:1px solid #cdd8ea;
  border-radius:3px;
  padding:1px 6px 1px 5px;
  font-size:10px;font-weight:600;color:#1c3250;
  white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
  transform:translate(0,-50%);
  pointer-events:auto;cursor:pointer;
  transition:opacity .15s, box-shadow .15s;
  min-opacity:0.75
}
.lbl:hover{
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  z-index:999;opacity:1!important
}

/* ── Ficha lateral ── */
#ficha{
  position:absolute;
  top:12px;right:12px;
  width:300px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.16);
  border:1px solid #dde3ec;
  z-index:800;
  overflow:hidden;
  transform:translateX(340px);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  pointer-events:auto
}
#ficha.open{transform:translateX(0)}
#ficha-header{
  padding:14px 16px 12px;
  border-bottom:1px solid #edf1f7
}
#ficha-close{
  position:absolute;top:10px;right:12px;
  background:none;border:none;cursor:pointer;
  color:#8a9bb5;font-size:18px;line-height:1;
  padding:2px 5px;border-radius:4px
}
#ficha-close:hover{background:#f0f4f8;color:#1d3a5f}
#ficha-nombre{
  font-size:13.5px;font-weight:700;color:#1d3a5f;
  line-height:1.35;padding-right:22px;margin-bottom:6px
}
#ficha-muni{
  display:inline-block;padding:2px 9px;border-radius:10px;
  font-size:11px;font-weight:600
}
#ficha-body{padding:12px 16px;display:flex;flex-direction:column;gap:9px}
.ficha-row{display:flex;gap:8px;align-items:flex-start}
.ficha-icon{
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;margin-top:1px
}
.ficha-label{font-size:10.5px;color:#8a9bb5;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.ficha-val{font-size:12.5px;color:#1d3a5f;line-height:1.4}
#ficha-footer{
  padding:10px 16px 12px;
  border-top:1px solid #edf1f7;
  display:flex;gap:8px
}
.ficha-btn{
  flex:1;padding:7px 0;border-radius:7px;
  font-size:12px;font-weight:600;border:none;cursor:pointer;
  transition:background .15s
}
.btn-maps{background:#e8f0fb;color:#2563a8}
.btn-maps:hover{background:#dbeafe}

/* badge colors */
.btj{background:#dbeafe;color:#1d4ed8}
.bmx{background:#dcfce7;color:#15803d}
.ben{background:#fef3c7;color:#92400e}
.bro{background:#f3e8ff;color:#7e22ce}
.bte{background:#fee2e2;color:#b91c1c}

/* icon backgrounds */
.ic-serv{background:#e8f0fb}
.ic-emp{background:#dcfce7}
.ic-ori{background:#fef3c7}
.ic-dir{background:#f0f4f8}
.ic-cert{background:#f3e8ff}
</style>
</head>
<body>

<div id="hdr">
  <h1>🏥 Industria Médica — Baja California</h1>
  <span class="cnt" id="cntBadge">115 empresas</span>
  <div id="ctrl">
    <select id="fMuni" onchange="applyFilter()">
      <option value="">Todos los municipios</option>
      <option>Tijuana</option><option>Mexicali</option>
      <option>Ensenada</option><option value="Playas De Rosarito">Rosarito</option>
      <option>Tecate</option>

    <input id="fSearch" type="text" placeholder="Buscar empresa…" oninput="applyFilter()" style="width:170px"/>
    <label class="chk"><input type="checkbox" id="chkL" checked onchange="schedRedraw()"> Etiquetas</label>
    <label class="chk"><input type="checkbox" id="chkC" checked onchange="schedRedraw()"> Conectores</label>
  </div>
</div>

<div id="map">
  <svg id="svgLayer"></svg>
  <div id="lblLayer"></div>

  <!-- Ficha empresa -->
  <div id="ficha">

      <button id="ficha-close" onclick="closeCard()">✕</button>
      <div id="ficha-nombre">—</div>
      <span id="ficha-muni" class="btj">—</span>
    </div>
    <div id="ficha-body">
      <div class="ficha-row">
        <div class="ficha-icon ic-serv">🔬</div>
        <div><div class="ficha-label">Servicio / Producto</div><div class="ficha-val" id="fc-serv">—</div></div>
      </div>
      <div class="ficha-row">
        <div class="ficha-icon ic-emp">👥</div>
        <div><div class="ficha-label">Empleos</div><div class="ficha-val" id="fc-emp">—</div></div>
      </div>
      <div class="ficha-row">
        <div class="ficha-icon ic-ori">🌍</div>
        <div><div class="ficha-label">Origen del capital</div><div class="ficha-val" id="fc-ori">—</div></div>
      </div>
      <div class="ficha-row">
        <div class="ficha-icon ic-cert">🏅</div>
        <div><div class="ficha-label">Certificaciones</div><div class="ficha-val" id="fc-cert">—</div></div>
      </div>
      <div class="ficha-row">
        <div class="ficha-icon ic-dir">📍</div>
        <div><div class="ficha-label">Dirección</div><div class="ficha-val" id="fc-dir">—</div></div>
      </div>
    </div>
    <div id="ficha-footer">
      <button class="ficha-btn btn-maps" id="btn-maps" onclick="openMaps()">📍 Ver en Google Maps</button>
    </div>
  </div>
</div>

// ── Build items ──────────────────────────────────────────────────
let items=DATA.map(d=>{
  const color=COL[d.municipio]||'#64748b';
  const short=(d.base||d.empresa).replace(/[,(].*/,'').trim().substring(0,32);
  const cm=L.circleMarker([d.lat,d.lng],{
    radius:5,color:'#fff',weight:1.8,fillColor:color,fillOpacity:1
  }).addTo(map);
  cm.on('click',()=>openCard({...d,color}));
  return {...d,color,short,cm,vis:true};
});

// ── Canvas text measure ──────────────────────────────────────────
const _cv=document.createElement('canvas');
const _cx=_cv.getContext('2d');
_cx.font='600 10px Segoe UI,sans-serif';
function tw(s){return _cx.measureText(s).width+14}
const LH=16;

// ── Force solver ─────────────────────────────────────────────────
function forceSolve(pts){
  pts.forEach(p=>{p.lw=tw(p.short);p.lx=p.px+12;p.ly=p.py;p.vx=0;p.vy=0});
  const ITER=200,REPEL=380,ANCHOR=0.045,DAMP=0.52;
  for(let i=0;i<ITER;i++){
    pts.forEach(p=>{p.fx=0;p.fy=0});
    for(let a=0;a<pts.length;a++){
      for(let b=a+1;b<pts.length;b++){
        const A=pts[a],B=pts[b];
        const ox=Math.min(A.lx+A.lw,B.lx+B.lw)-Math.max(A.lx,B.lx);
        const oy=Math.min(A.ly+LH/2,B.ly+LH/2)-Math.max(A.ly-LH/2,B.ly-LH/2);
        if(ox>0&&oy>0){
          const cx=(A.lx+A.lw/2)-(B.lx+B.lw/2);
          const cy=A.ly-B.ly;
          const len=Math.max(Math.hypot(cx,cy),.1);
          const f=REPEL*(ox*oy)/((A.lw+B.lw)*(LH*2)+1);
          A.fx+=cx/len*f;A.fy+=cy/len*f;
          B.fx-=cx/len*f;B.fy-=cy/len*f;
        }
      }
    }
    // dot repulsion
    pts.forEach(p=>{
      pts.forEach(b=>{
        const dx=p.lx+p.lw/2-b.px,dy=p.ly-b.py;
        const d2=dx*dx+dy*dy+.1;
        if(d2<700){const f=REPEL*.22/d2;p.fx+=dx*f;p.fy+=dy*f}
      });
    });
    // spring to anchor
    pts.forEach(p=>{
      const pull=ANCHOR*(1+i/ITER*.5);
      p.fx+=(p.px+12-p.lx)*pull;
      p.fy+=(p.py-p.ly)*pull;
    });
    pts.forEach(p=>{p.vx=(p.vx+p.fx)*DAMP;p.vy=(p.vy+p.fy)*DAMP;p.lx+=p.vx;p.ly+=p.vy});
  }
}

// ── Opacity: only dim if heavily overlapping (>60%), min 0.72 ────
function setOpacity(pts){
  pts.forEach(p=>p.alpha=1.0);
  for(let a=0;a<pts.length;a++){
    for(let b=a+1;b<pts.length;b++){
      const A=pts[a],B=pts[b];
      const ox=Math.min(A.lx+A.lw,B.lx+B.lw)-Math.max(A.lx,B.lx);
      const oy=Math.min(A.ly+LH/2,B.ly+LH/2)-Math.max(A.ly-LH/2,B.ly-LH/2);
      if(ox>0&&oy>0){
        const ratio=(ox*oy)/(Math.min(A.lw,B.lw)*LH);
        if(ratio>.35){
          const dim=Math.max(0.72,1-ratio*.6);  // never below 0.72
          if(A.lw<=B.lw) A.alpha=Math.min(A.alpha,dim);
          else            B.alpha=Math.min(B.alpha,dim);
        }
      }
    }
  }
}

// ── Draw ─────────────────────────────────────────────────────────
function redraw(){
  svgEl.innerHTML='';
  lblEl.innerHTML='';
  if(!document.getElementById('chkL').checked) return;
  const showC=document.getElementById('chkC').checked;

  const sz=map.getSize();
  const pad=80;
  const pts=items.filter(it=>{
    if(!it.vis) return false;
    const p=map.latLngToContainerPoint([it.lat,it.lng]);
    return p.x>-pad&&p.x<sz.x+pad&&p.y>-pad&&p.y<sz.y+pad;
  }).map(it=>{
    const p=map.latLngToContainerPoint([it.lat,it.lng]);
    return {...it,px:p.x,py:p.y};
  });

  forceSolve(pts);
  setOpacity(pts);

  pts.forEach(p=>{
    if(showC){
      const dist=Math.hypot(p.lx-p.px,p.ly-p.py);
      if(dist>8){
        const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',p.px);ln.setAttribute('y1',p.py);
        ln.setAttribute('x2',p.lx);ln.setAttribute('y2',p.ly);
        ln.setAttribute('stroke',p.color);
        ln.setAttribute('stroke-width','0.9');
        ln.setAttribute('opacity','0.55');
        svgEl.appendChild(ln);
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',p.px);c.setAttribute('cy',p.py);
        c.setAttribute('r','2.5');c.setAttribute('fill',p.color);c.setAttribute('opacity','0.8');
        svgEl.appendChild(c);
      }
    }
    const div=document.createElement('div');
    div.className='lbl';
    div.style.cssText=`left:${p.lx}px;top:${p.ly}px;border-left:2.5px solid ${p.color};opacity:${p.alpha}`;
    div.textContent=p.short;
    div.onclick=()=>openCard({...p,color:p.color});
    lblEl.appendChild(div);
  });
}

// ── Filter ───────────────────────────────────────────────────────
function applyFilter(){
  const muni=document.getElementById('fMuni').value;
  const q=document.getElementById('fSearch').value.toLowerCase();
  let count=0;
  items.forEach(it=>{
    const show=(!muni||it.municipio===muni)&&(!q||it.empresa.toLowerCase().includes(q));
    it.vis=show;
    if(show){it.cm.addTo(map);count++;}
    else map.removeLayer(it.cm);
  });
  document.getElementById('cntBadge').textContent=count+' empresas';
  schedRedraw();
}

let _rt=null;
function schedRedraw(){clearTimeout(_rt);_rt=setTimeout(redraw,80)}
map.on('move zoom',()=>{svgEl.innerHTML='';lblEl.innerHTML=''});
map.on('moveend zoomend',schedRedraw);
setTimeout(redraw,250);
</script>
