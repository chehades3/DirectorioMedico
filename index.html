<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column}
#header{
  padding:10px 18px;background:#fff;border-bottom:1px solid #dde3ec;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(0,0,0,.07);z-index:1000;position:relative
}
#header h1{font-size:14px;font-weight:700;color:#1d3a5f;white-space:nowrap}
.cnt{background:#e8f0fb;color:#2563a8;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid #c5d8f5}
#controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-left:auto}
#controls select,#controls input{
  background:#f7f9fc;border:1px solid #c8d4e3;color:#2a3a50;
  padding:5px 9px;border-radius:6px;font-size:12px;outline:none
}
#controls select:focus,#controls input:focus{border-color:#3b82f6}
label.chk{font-size:12px;color:#4a5f78;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
#map{flex:1;position:relative;overflow:hidden}

/* SVG leader-line overlay — sits above tiles, below popups */
#leaderSvg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:400;overflow:visible
}
/* Labels container */
#labelsCont{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:450
}
.mlabel{
  position:absolute;
  background:rgba(255,255,255,.93);
  border:1px solid #d0daea;
  border-radius:3px;
  padding:1px 6px 1px 5px;
  font-size:10px;font-weight:600;color:#1d3a5f;
  white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
  transform:translateY(-50%);
  pointer-events:auto;
  cursor:pointer
}

/* Leaflet popup */
.leaflet-popup-content-wrapper{
  background:#fff;color:#1a2533;
  border:1px solid #dde3ec;border-radius:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.13);max-width:290px
}
.leaflet-popup-tip{background:#fff}
.pu-name{font-size:13px;font-weight:700;color:#1d3a5f;margin-bottom:5px;line-height:1.35}
.pu-row{font-size:11.5px;color:#4a5f78;margin:3px 0;line-height:1.45}
.pu-row b{color:#1d3a5f}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600;margin-top:3px}
.b-tj{background:#dbeafe;color:#1d4ed8}
.b-mx{background:#dcfce7;color:#15803d}
.b-en{background:#fef3c7;color:#92400e}
.b-ro{background:#f3e8ff;color:#7e22ce}
.b-te{background:#fee2e2;color:#b91c1c}
</style>

const COLORS = {
  'Tijuana':           '#2563eb',
  'Mexicali':          '#16a34a',
  'Ensenada':          '#d97706',
  'Playas De Rosarito':'#9333ea',
  'Tecate':            '#dc2626'
};
const BADGE = {
  'Tijuana':'b-tj','Mexicali':'b-mx','Ensenada':'b-en',
  'Playas De Rosarito':'b-ro','Tecate':'b-te'
};

// ── Map ──────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:true}).setView([32.52,-116.9],9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CartoDB',subdomains:'abcd',maxZoom:19
}).addTo(map);

const svgEl   = document.getElementById('leaderSvg');
const labCont = document.getElementById('labelsCont');

// ── Build marker objects (invisible Leaflet circles for popups) ──
let allItems = RAW.map(d => {
  const color = COLORS[d.municipio]||'#64748b';
  const shortName = (d.base||d.empresa).replace(/,.*$/,'').trim();
  const cm = L.circleMarker([d.lat,d.lng],{
    radius:5, color:'#fff', weight:1.5,
    fillColor:color, fillOpacity:1, pane:'markerPane'
  });
  cm.bindPopup(`
    <div class="pu-name">${d.empresa}</div>
    <span class="badge ${BADGE[d.municipio]||'b-tj'}">${d.municipio}</span>
    <div class="pu-row" style="margin-top:5px"><b>Servicio:</b> ${d.servicio.substring(0,110)}${d.servicio.length>110?'…':''}</div>
    <div class="pu-row"><b>Empleos:</b> ${d.empleos||'N/D'}</div>
    <div class="pu-row"><b>Origen:</b> ${d.origen||'N/D'}</div>
    <div class="pu-row"><b>Dirección:</b> ${d.direccion||'N/D'}</div>
  `,{maxWidth:290});
  cm.addTo(map);
  return {...d, color, shortName, cm, visible:true};
});

// ── Filter ───────────────────────────────────────────────────────
function applyFilter() {
  const muni = document.getElementById('filterMuni').value;
  const q    = document.getElementById('searchBox').value.toLowerCase();
  let count  = 0;
  allItems.forEach(item => {
    const show = (!muni || item.municipio===muni) &&
                 (!q    || item.empresa.toLowerCase().includes(q));
    item.visible = show;
    if(show) { item.cm.addTo(map); count++; }
    else     { map.removeLayer(item.cm); }
  });
  document.getElementById('countBadge').textContent = count+' empresas';
  redraw();
}

// ── Force-directed label placement ───────────────────────────────
const LABEL_W  = 120;
const LABEL_H  = 16;
const ITER     = 80;
const REPEL    = 3.5;
const SPRING_K = 0.06;
const ANCHOR_X = 14; // pixels right of dot for initial label anchor

function forceSpread(pts) {
  // init label positions offset from dot
  pts.forEach(p => {
    p.lx = p.px + ANCHOR_X;
    p.ly = p.py;
  });
  for(let it=0; it<ITER; it++) {
    // Repulsion between labels
    for(let i=0;i<pts.length;i++) {
      for(let j=i+1;j<pts.length;j++) {
        const a=pts[i], b=pts[j];
        const dx = a.lx - b.lx;
        const dy = a.ly - b.ly;
        const ox = LABEL_W  - Math.abs(dx) + 6;
        const oy = LABEL_H  - Math.abs(dy) + 3;
        if(ox>0 && oy>0) {
          // Overlap → push apart along shortest axis
          if(ox < oy) {
            const push = ox/2 * REPEL * 0.25;
            const sign = dx>=0?1:-1;
            a.lx += sign*push; b.lx -= sign*push;
          } else {
            const push = oy/2 * REPEL * 0.25;
            const sign = dy>=0?1:-1;
            a.ly += sign*push; b.ly -= sign*push;
          }
        }
      }
    }
    // Spring: pull label back toward anchor
    pts.forEach(p => {
      p.lx += (p.px + ANCHOR_X - p.lx) * SPRING_K;
      p.ly += (p.py           - p.ly) * SPRING_K;
    });
  }
}

// ── Redraw labels + lines ─────────────────────────────────────────
function redraw() {
  svgEl.innerHTML   = '';
  labCont.innerHTML = '';
  const showLabels = document.getElementById('chkLabels').checked;
  const showLines  = document.getElementById('chkLines').checked;
  if(!showLabels) return;

  const bounds = map.getBounds().pad(0.05);
  const pts = allItems
    .filter(item => item.visible && bounds.contains([item.lat,item.lng]))
    .map(item => {
      const p = map.latLngToContainerPoint([item.lat,item.lng]);
      return {...item, px:p.x, py:p.y};
    });

  forceSpread(pts);

  pts.forEach(p => {
    const dist = Math.hypot(p.lx - p.px, p.ly - p.py);

    // Leader line
    if(showLines && dist > 6) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', p.px); line.setAttribute('y1', p.py);
      line.setAttribute('x2', p.lx); line.setAttribute('y2', p.ly);
      line.setAttribute('stroke', p.color);
      line.setAttribute('stroke-width','1');
      line.setAttribute('opacity','0.45');
      svgEl.appendChild(line);
    }

    // Label
    const div = document.createElement('div');
    div.className = 'mlabel';
    div.style.cssText += `left:${p.lx}px;top:${p.ly}px;border-left:2px solid ${p.color}`;
    div.textContent = p.shortName;
    div.onclick = () => p.cm.openPopup();
    labCont.appendChild(div);
  });
}

// Redraw on map movement (debounced)
let rTimer;
map.on('moveend zoomend viewreset', () => {
  clearTimeout(rTimer);
  rTimer = setTimeout(redraw, 60);
});
map.on('move zoom', () => {
  svgEl.innerHTML=''; labCont.innerHTML='';
});

// Initial draw
setTimeout(redraw, 200);
</script>
